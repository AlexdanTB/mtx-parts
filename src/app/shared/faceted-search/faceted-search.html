<section class="bg-white min-h-screen py-12 font-sans border-t border-gray-200">
  <div class="container mx-auto px-4 lg:px-6">

    <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between border-b border-gray-200 pb-4">
      <div>
        <h1 class="text-4xl font-black text-gray-900 uppercase tracking-tighter">Catálogo de Repuestos</h1>
        <p class="text-tiger-flame-500 font-bold uppercase tracking-widest text-sm mt-2">Mostrando 124 resultados</p>
      </div>

      <div class="mt-4 md:mt-0 flex items-center gap-3">
        <label class="text-gray-500 text-xs font-bold uppercase tracking-widest">Ordenar por:</label>
        <select class="bg-gray-50 text-gray-900 border border-gray-200 px-4 py-2 outline-none focus:border-tiger-flame-500 focus:bg-white text-sm font-bold uppercase cursor-pointer appearance-none transition-colors">
          <option>Más Relevantes</option>
          <option>Menor a Mayor Precio</option>
          <option>Mayor a Menor Precio</option>
          <option>Lo más nuevo</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

      <aside class="col-span-1">
        <div class="bg-white p-6 border-t-4 border-tiger-flame-500 sticky top-28 shadow-lg shadow-gray-100 border border-gray-200">

          <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-3">
            <h3 class="text-gray-900 font-black uppercase tracking-widest text-lg">Filtros</h3>
            <button class="text-xs text-gray-400 hover:text-tiger-flame-500 uppercase font-bold underline transition-colors">Limpiar</button>
          </div>

          <div class="mb-6">
            <input type="text" placeholder="Buscar pieza..."
              class="w-full bg-gray-50 border border-gray-200 px-4 py-3 text-gray-900 placeholder-gray-400 focus:bg-white focus:border-tiger-flame-500 focus:ring-1 focus:ring-tiger-flame-500 outline-none text-sm transition-all">
          </div>

          <div class="mb-6">
            <h4 class="text-tiger-flame-500 font-bold uppercase text-xs tracking-widest mb-3">Categorías</h4>
            <div class="space-y-2">
              @for (cat of categorias; track cat) {
              <label class="flex items-center gap-3 cursor-pointer group">
                <div class="relative flex items-center justify-center w-5 h-5 border-2 border-gray-300 bg-white group-hover:border-tiger-flame-500 transition-colors">
                  <input type="checkbox" class="peer sr-only">
                  <svg class="w-3 h-3 text-tiger-flame-500 opacity-0 peer-checked:opacity-100 transition-opacity absolute" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                </div>
                <span class="text-gray-600 text-sm font-medium group-hover:text-gray-900 transition-colors">{{ cat }}</span>
              </label>
              }
            </div>
          </div>

          <div class="mb-6">
            <h4 class="text-tiger-flame-500 font-bold uppercase text-xs tracking-widest mb-3">Marcas</h4>
            <div class="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
              @for (marca of marcas; track marca) {
              <label class="flex items-center gap-3 cursor-pointer group">
                <div class="relative flex items-center justify-center w-5 h-5 border-2 border-gray-300 bg-white group-hover:border-tiger-flame-500 transition-colors">
                  <input type="checkbox" class="peer sr-only">
                  <svg class="w-3 h-3 text-tiger-flame-500 opacity-0 peer-checked:opacity-100 transition-opacity absolute" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                </div>
                <span class="text-gray-600 text-sm font-medium group-hover:text-gray-900 transition-colors">{{ marca }}</span>
              </label>
              }
            </div>
          </div>

          <div>
            <h4 class="text-tiger-flame-500 font-bold uppercase text-xs tracking-widest mb-3">Rango de Precio</h4>
            <div class="flex items-center gap-2">
              <input type="number" placeholder="Min" class="w-full bg-gray-50 border border-gray-200 px-3 py-2 text-gray-900 text-sm outline-none focus:bg-white focus:border-tiger-flame-500 transition-all">
              <span class="text-gray-400">-</span>
              <input type="number" placeholder="Max" class="w-full bg-gray-50 border border-gray-200 px-3 py-2 text-gray-900 text-sm outline-none focus:bg-white focus:border-tiger-flame-500 transition-all">
            </div>
            <button class="w-full mt-4 bg-gray-900 text-white font-bold uppercase text-xs py-3 hover:bg-tiger-flame-500 transition-colors">
              Aplicar Precio
            </button>
          </div>

        </div>
      </aside>

      <div class="col-span-1 lg:col-span-3">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

          @for (item of [1,2,3,4,5,6]; track $index) {
          <div class="bg-white border border-gray-200 hover:border-tiger-flame-500 transition-all duration-300 shadow-sm hover:shadow-lg hover:shadow-tiger-flame-500/10 group flex flex-col h-full relative">

            <div class="h-48 overflow-hidden bg-gray-50 p-4 border-b border-gray-100 flex items-center justify-center">
              <img src="https://i.pinimg.com/1200x/6a/18/46/6a18462f3b425e0e6273dd6eef0a5d33.jpg" alt="Repuesto" class="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform duration-500 mix-blend-multiply">
            </div>

            <div class="p-6 flex flex-col flex-grow">
              <span class="text-tiger-flame-500 text-[10px] font-bold uppercase tracking-widest mb-1 block">Frenos / Honda</span>
              <h3 class="text-lg font-black text-gray-900 uppercase leading-tight mb-4 flex-grow group-hover:text-tiger-flame-600 transition-colors">Kit de Pastillas de Freno Sinterizadas</h3>

              <div class="flex justify-between items-end mt-auto pt-4 border-t border-gray-100">
                <div>
                  <p class="text-2xl font-black text-gray-900">$45.00</p>
                </div>
                <button class="w-12 h-12 bg-white border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-tiger-flame-500 hover:text-white hover:border-tiger-flame-500 transition-colors shadow-sm rounded-sm">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                </button>
              </div>
            </div>
          </div>
          }
        </div>

        <div class="mt-12 flex justify-center gap-2">
          <button class="w-10 h-10 flex items-center justify-center border border-gray-200 bg-white text-gray-400 hover:border-tiger-flame-500 hover:text-tiger-flame-500 transition-colors shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
          </button>
          
          <button class="w-10 h-10 flex items-center justify-center bg-tiger-flame-500 text-white font-black border border-tiger-flame-500 shadow-sm">1</button>
          
          <button class="w-10 h-10 flex items-center justify-center border border-gray-200 bg-white text-gray-600 font-bold hover:border-tiger-flame-500 hover:text-tiger-flame-500 transition-colors shadow-sm">2</button>
          
          <button class="w-10 h-10 flex items-center justify-center border border-gray-200 bg-white text-gray-600 font-bold hover:border-tiger-flame-500 hover:text-tiger-flame-500 transition-colors shadow-sm">3</button>
          
          <button class="w-10 h-10 flex items-center justify-center border border-gray-200 bg-white text-gray-400 hover:border-tiger-flame-500 hover:text-tiger-flame-500 transition-colors shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
          </button>
        </div>

      </div>
    </div>
  </div>
</section>
