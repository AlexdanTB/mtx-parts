<section class="bg-white py-16 border-y border-gray-200 overflow-hidden font-sans">
      
  <div class="container mx-auto px-4 mb-10">
    <div class="text-center">
      <h3 class="text-3xl md:text-4xl font-black text-gray-900 uppercase mt-2 tracking-tighter">
        Marcas de <span class="text-tiger-flame-500">Motos</span>
      </h3>
    </div>
  </div>

  <div class="relative w-full overflow-hidden flex group bg-gray-50 py-8 mask-image-fade border-y border-gray-100">
    
    <div class="flex animate-scroll hover:[animation-play-state:paused] w-max">
      
      <div class="flex items-center gap-16 md:gap-24 px-8">
        @for (marca of marcasMotos; track $index) {
          <div class="w-32 md:w-48 flex-shrink-0 flex items-center justify-center grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-300 hover:scale-110 cursor-pointer">
            <img [src]="marca.img" [alt]="marca.nombre" class="h-20 md:h-24 object-contain pointer-events-none drop-shadow-sm">
          </div>
        }
      </div>

      <div class="flex items-center gap-16 md:gap-24 px-8">
        @for (marca of marcasMotos; track $index) {
          <div class="w-32 md:w-48 flex-shrink-0 flex items-center justify-center grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-300 hover:scale-110 cursor-pointer">
            <img [src]="marca.img" [alt]="marca.nombre" class="h-20 md:h-24 object-contain pointer-events-none drop-shadow-sm">
          </div>
        }
      </div>

    </div>

  </div>
</section>
