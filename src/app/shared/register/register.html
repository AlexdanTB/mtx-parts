<div class="flex items-center justify-center min-h-screen px-4 py-12 bg-gray-50 relative overflow-hidden font-sans">

    <div class="absolute top-0 right-0 w-96 h-96 rounded-full pointer-events-none -translate-y-1/2 translate-x-1/3 opacity-20 bg-tiger-flame-500 blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-80 h-80 rounded-full pointer-events-none translate-y-1/2 -translate-x-1/3 opacity-30 bg-gray-400 blur-3xl"></div>

    <div class="w-full max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl shadow-gray-200/50 border border-gray-200 relative z-10 p-8 sm:p-12">

        <div class="text-center mb-10">
            <span class="inline-flex items-center gap-2 text-[10px] font-black tracking-[.2em] uppercase text-tiger-flame-500 mb-2">
                Nuevo Piloto
            </span>
            <h2 class="text-3xl font-black text-gray-900 tracking-tighter uppercase leading-tight">Crea tu cuenta</h2>
            <p class="text-gray-500 text-sm mt-2 font-medium">Únete a la comunidad biker más grande.</p>
        </div>

        @if (errorMessage()) {
            <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm">
                {{ errorMessage() }}
            </div>
        }

        <form (ngSubmit)="registrarUsuario()" #regForm="ngForm" class="space-y-5">

            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-gray-500 ml-1">Nombre Completo *</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-tiger-flame-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0" />
                        </svg>
                    </span>
                    <input [(ngModel)]="nuevoUsuario.nombreCompleto" name="nombreCompleto" type="text" required
                        placeholder="Anderson Guabil" 
                        class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-sm font-medium text-gray-900 focus:bg-white focus:border-tiger-flame-500 focus:ring-4 focus:ring-tiger-flame-500/10 outline-none transition-all" />
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-gray-500 ml-1">Correo Electrónico *</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-tiger-flame-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                        </svg>
                    </span>
                    <input [(ngModel)]="nuevoUsuario.email" name="email" type="email" required
                        placeholder="piloto@rutamoto.com"
                        class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-sm font-medium text-gray-900 focus:bg-white focus:border-tiger-flame-500 focus:ring-4 focus:ring-tiger-flame-500/10 outline-none transition-all" />
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-gray-500 ml-1">Contraseña *</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-tiger-flame-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                        </svg>
                    </span>
                    <input [(ngModel)]="nuevoUsuario.password" name="password" type="password" required
                        placeholder="••••••••••••"
                        class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-sm font-medium text-gray-900 focus:bg-white focus:border-tiger-flame-500 focus:ring-4 focus:ring-tiger-flame-500/10 outline-none transition-all" />
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-gray-500 ml-1">Teléfono</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-tiger-flame-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
                        </svg>
                    </span>
                    <input [(ngModel)]="nuevoUsuario.telefono" name="telefono" type="tel"
                        placeholder="0991234567"
                        class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-sm font-medium text-gray-900 focus:bg-white focus:border-tiger-flame-500 focus:ring-4 focus:ring-tiger-flame-500/10 outline-none transition-all" />
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-gray-500 ml-1">Dirección</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-tiger-flame-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                        </svg>
                    </span>
                    <input [(ngModel)]="nuevoUsuario.direccion" name="direccion" type="text"
                        placeholder="Calle Principal 123"
                        class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-sm font-medium text-gray-900 focus:bg-white focus:border-tiger-flame-500 focus:ring-4 focus:ring-tiger-flame-500/10 outline-none transition-all" />
                </div>
            </div>

            <button type="submit" 
                [disabled]="!regForm.form.valid || loading()"
                class="w-full flex items-center justify-center gap-3 mt-8 px-6 py-4 bg-tiger-flame-500 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-tiger-flame-500/30 hover:bg-tiger-flame-600 hover:-translate-y-1 active:translate-y-0 disabled:opacity-50 disabled:shadow-none disabled:hover:translate-y-0 transition-all duration-300 cursor-pointer">
                @if (loading()) {
                    Registrando...
                } @else {
                    Registrar Cuenta
                }
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25L21 12m0 0l-3.75 3.75M21 12H3" />
                </svg>
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400 font-bold tracking-tighter">¿Ya tienes cuenta?</span></div>
        </div>

        <button routerLink="/login" 
            class="flex items-center justify-center w-full py-3.5 rounded-2xl border-2 border-gray-100 text-gray-700 font-black uppercase tracking-wider text-xs hover:bg-gray-50 hover:border-tiger-flame-200 hover:text-tiger-flame-500 transition-all text-center">
            Iniciar Sesión
        </button>

    </div>
</div>
