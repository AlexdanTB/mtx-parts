<section class="bg-white py-16 lg:py-24 font-sans border-y border-gray-200">
    <div class="container mx-auto px-4 lg:px-8 xl:max-w-7xl">

        <div class="flex flex-col md:flex-row md:items-end justify-between mb-10">
            <div>
                <h2 class="text-4xl md:text-5xl font-black text-gray-900 uppercase tracking-tighter mb-2">
                    Compra <span class="text-tiger-flame-500">Repuestos</span>
                </h2>
            </div>
            <p class="mt-4 md:mt-0 text-gray-500 font-bold uppercase tracking-widest text-sm">
                Selecciona una categoría
            </p>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 md:grid-cols-3">
            @for(cat of categorias; track cat.titulo) {
            <a [href]="cat.link"
                class="group relative block h-64 sm:h-72 overflow-hidden bg-white border border-gray-200 hover:border-tiger-flame-500 transition-all duration-300 shadow-sm hover:shadow-xl">

                <img [src]="cat.img" alt="{{cat.titulo}}"
                    class="absolute inset-0 w-full h-full object-cover grayscale-[0.3] contrast-100 group-hover:grayscale-0 group-hover:scale-110 transition-all duration-700 ease-out" />

                <div
                    class="absolute inset-0 bg-gradient-to-t from-white via-white/80 to-transparent opacity-0 group-hover:opacity-90 transition-opacity duration-500">
                </div>

                <div class="absolute bottom-0 left-0 w-full p-6 flex items-end justify-between overflow-hidden">

                    <div class="relative z-10">
                        <h3
                            class="text-2xl sm:text-3xl font-black text-tiger-flame-500 uppercase tracking-tight opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-75">
                            {{cat.titulo}}
                        </h3>
                    </div>

                    <div
                        class="w-10 h-10 bg-tiger-flame-500 flex items-center justify-center text-white translate-x-12 opacity-0 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-500 delay-150 shadow-md">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </div>
                </div>
            </a>
            }
        </div>

    </div>
</section>
