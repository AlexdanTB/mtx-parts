<div class="flex items-center justify-center min-h-screen px-4 py-12 bg-gray-50 relative overflow-hidden font-sans">

  <div class="absolute top-0 right-0 w-96 h-96 rounded-full pointer-events-none -translate-y-1/2 translate-x-1/3 opacity-20 bg-tiger-flame-500 blur-3xl"></div>
  <div class="absolute bottom-0 left-0 w-80 h-80 rounded-full pointer-events-none translate-y-1/2 -translate-x-1/3 opacity-30 bg-gray-400 blur-3xl"></div>

  <div class="w-full max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl shadow-gray-200/50 border border-gray-200 relative z-10 p-8 sm:p-12">
    
    <form (ngSubmit)="iniciarSesion()" #loginForm="ngForm">
      
      <div class="mb-10 text-center">
        <div class="flex items-center justify-center gap-2 mb-4 text-tiger-flame-500">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <span class="inline-flex items-center gap-2 text-[10px] font-black tracking-[.2em] uppercase text-tiger-flame-500 mb-2">
          Bienvenido de nuevo
        </span>
        <h1 class="text-3xl font-black text-gray-900 leading-tight uppercase tracking-tighter">Iniciar sesión</h1>
        <p class="text-gray-500 text-sm mt-2 font-medium">Accede a tu garaje personal.</p>
      </div>

      <div class="space-y-2 mb-5">
        <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">email electrónico</label>
        <div class="relative group">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-tiger-flame-500 transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
          </span>
          <input type="email" [(ngModel)]="email" name="email" required placeholder="piloto@rutamoto.com"
            class="w-full pl-12 pr-4 py-4 rounded-2xl bg-gray-50 border border-gray-200 text-sm text-gray-900 outline-none transition-all duration-300 focus:border-tiger-flame-500 focus:ring-4 focus:ring-tiger-flame-500/10 focus:bg-white font-medium" />
        </div>
      </div>

      <div class="space-y-2 mb-8">
        <div class="flex justify-between items-center ml-1">
           <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Contraseña</label>
        </div>
        
        <div class="relative group">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-tiger-flame-500 transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </span>
          <input [type]="mostrarPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required
            placeholder="••••••••"
            class="w-full pl-12 pr-12 py-4 rounded-2xl bg-gray-50 border border-gray-200 text-sm text-gray-900 outline-none transition-all duration-300 focus:border-tiger-flame-500 focus:ring-4 focus:ring-tiger-flame-500/10 focus:bg-white font-medium" />

          <button type="button" (click)="mostrarPassword = !mostrarPassword"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-tiger-flame-500 transition-colors p-1">
            @if (!mostrarPassword) {
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            } @else {
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="!loginForm.form.valid"
        class="w-full flex items-center justify-center gap-3 px-6 py-4 text-sm font-black uppercase tracking-widest text-white bg-tiger-flame-500 rounded-2xl shadow-lg shadow-tiger-flame-500/30 hover:bg-tiger-flame-600 hover:-translate-y-1 transition-all duration-300 active:scale-[0.98] group disabled:opacity-50 disabled:hover:translate-y-0 disabled:shadow-none border border-transparent">
        <span>Iniciar Sesión</span>
        <svg class="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
      <span class="text-xs text-gray-500 font-medium">¿Aún no tienes cuenta?</span>
      <a routerLink="/registrarse" class="ml-2 text-xs font-black text-tiger-flame-500 hover:text-tiger-flame-600 uppercase tracking-widest transition-colors">
        Regístrate aquí
      </a>
    </div>
    
  </div>
</div>
